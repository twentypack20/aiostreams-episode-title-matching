name: Nightly Builds

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - '!packages/docs/**'
      - 'package-lock.json'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsconfig.base.json'
      - 'Dockerfile'

jobs:
  release:
    name: release
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate timestamp tag
        id: gen_tag
        run: |
          TIMESTAMP=$(date '+%Y.%m.%d.%H%M-nightly')
          echo "tag_name=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Get last nightly tag
        id: get_last_nightly_tag
        run: |
          LAST_NIGHTLY_TAG=$(git tag -l "*-nightly" --sort=-committerdate | head -n 1 || echo "")
          echo "last_nightly_tag=$LAST_NIGHTLY_TAG" >> $GITHUB_OUTPUT
          echo "Found last nightly tag: ${LAST_NIGHTLY_TAG:-none}"

      - name: Get commit messages
        id: commit_msgs
        run: |
          expand_commits() {
            local range="$1"
            local result=""
            local hashes

            mapfile -t hashes < <(git log "$range" --pretty=format:"%H")

            for hash in "${hashes[@]}"; do
              subject=$(git log -1 --pretty=format:"%s" "$hash")
              body=$(git log -1 --pretty=format:"%b" "$hash")
              short_hash="${hash:0:7}"

              # Extract lines from the body that match conventional commit format
              cc_lines=$(echo "$body" | grep -E '^(feat|fix|docs|style|refactor|test|chore|ci|build|perf|revert)(\([^)]+\))?!?: .+' || true)

              if [ -n "$cc_lines" ]; then
                while IFS= read -r cc_line; do
                  result="${result}* ${cc_line}"$'\n'
                done <<< "$cc_lines"
              else
                result="${result}* ${subject} (${short_hash})"$'\n'
              fi
            done

            printf "%s" "$result"
          }

          if [ -z "${{ steps.get_last_nightly_tag.outputs.last_nightly_tag }}" ]; then
            echo "No previous nightly tag found. Getting recent commits."
            COMMIT_MSGS=$(expand_commits "-n 20")
          else
            echo "Getting commits since ${{ steps.get_last_nightly_tag.outputs.last_nightly_tag }}"
            COMMIT_MSGS=$(expand_commits "${{ steps.get_last_nightly_tag.outputs.last_nightly_tag }}..HEAD")
          fi

          if [ -z "$COMMIT_MSGS" ]; then
            COMMIT_MSGS="No new commits since last nightly build"
          fi

          echo "commit_msgs<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create git tag
        env:
          TAG_NAME: ${{ steps.gen_tag.outputs.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $TAG_NAME
          git push origin $TAG_NAME

      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.gen_tag.outputs.tag_name }}
          LAST_NIGHTLY_TAG: ${{ steps.get_last_nightly_tag.outputs.last_nightly_tag }}
          COMMIT_MSGS: ${{ steps.commit_msgs.outputs.commit_msgs }}
        run: |
          RELEASE_NOTES=$(cat <<EOF
          ## $TAG_NAME

          $COMMIT_MSGS
          EOF
          )

          gh release create "$TAG_NAME" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "$TAG_NAME" \
            --notes "$RELEASE_NOTES" \
            --prerelease

      - name: Trigger Docker Image Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run --repo ${GITHUB_REPOSITORY} deploy-docker.yml -f ref=${{ steps.gen_tag.outputs.tag_name }}
